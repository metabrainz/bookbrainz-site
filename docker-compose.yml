services:

  bookbrainz-site:
    container_name: bookbrainz-site
    command: yarn start
    build:
      context: ./
      dockerfile: Dockerfile
      target: bookbrainz-dev
    restart: unless-stopped
    user: bookbrainz
    ports:
      - "9099:9099"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - "./config/config.json:/home/bookbrainz/bookbrainz-site/config/config.json:ro"

  postgres:
    container_name: postgres
    restart: unless-stopped
    image: postgres:16
    user: postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=bookbrainz
      - POSTGRES_USER=bookbrainz
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookbrainz -d bookbrainz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  elasticsearch:
    container_name: elasticsearch
    restart: unless-stopped
    image: docker.elastic.co/elasticsearch/elasticsearch:5.6.8
    environment:
      # Skip bootstrap checks (see https://github.com/docker-library/elasticsearch/issues/98)
      - transport.host=127.0.0.1
      - discovery.zen.minimum_master_nodes=1
      - xpack.security.enabled=false
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    container_name: redis
    restart: unless-stopped
    image: redis:3.2-alpine
    command: "redis-server --appendonly yes"
    ports:
      - "127.0.0.1:6379:6379"
      - "127.0.0.1:3600:3600"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  # startup:
  #   image: waisbrot/wait
  #   container_name: startup
  #   restart: "no"
  #   environment:
  #     - TARGETS=redis:6379,postgres:5432,elasticsearch:9200
  #     - TIMEOUT=60
  #   depends_on:
  #     - elasticsearch
  #     - redis
  #     - postgres

volumes:
  postgres-data:
  elasticsearch-data:
