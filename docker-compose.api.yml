services:

  bookbrainz-api:
    container_name: bookbrainz-api
    command: yarn run start-api
    build:
      context: ./
      dockerfile: Dockerfile
      target: bookbrainz-dev
    restart: unless-stopped
    ports:
      - "9098:9098"
    depends_on:
      # elasticsearch:
      #   condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - "./config/config.json:/home/bookbrainz/bookbrainz-site/config/config.json:ro"
  
  postgres:
    container_name: postgres
    restart: unless-stopped
    image: postgres:16
    user: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U $$POSTGRES_USER -c 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # elasticsearch:
  #   container_name: elasticsearch
  #   restart: unless-stopped
  #   image: docker.elastic.co/elasticsearch/elasticsearch:5.6.8
  #   environment:
  #     # Skip bootstrap checks (see https://github.com/docker-library/elasticsearch/issues/98)
  #     - transport.host=127.0.0.1
  #     - discovery.zen.minimum_master_nodes=1
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - elasticsearch-data:/usr/share/elasticsearch/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 20
  #     start_period: 20s

  redis:
    container_name: redis
    restart: unless-stopped
    image: redis:3.2-alpine
    command: "redis-server --appendonly yes"
    ports:
      - "6379:6379"
      - "3600:3600"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  postgres-data:
  # elasticsearch-data:
